<section class="crud-card" id="transacoesCrudRoot">
    <header class="crud-card__header">
        <div>
            <h2>Transações Financeiras</h2>
            <p>Gerencie suas transações com filtros por período, categoria, texto e valor.</p>
        </div>

        <button id="transacoesAddBtn" type="button" class="action-btn action-btn--primary action-btn--static-label" title="Adicionar transação" aria-label="Adicionar transação">
            <span class="action-btn__icon" aria-hidden="true">＋</span>
            <span class="action-btn__label">Adicionar transação</span>
        </button>
    </header>

    <div class="crud-toolbar metas-filters-grid">
        <input id="transacoesSearchInput" class="crud-search" type="search" placeholder="Filtrar por descrição" autocomplete="off">

        <input id="transacoesValorFilterInput" class="crud-search" type="text" inputmode="decimal" placeholder="Filtrar por valor (R$)">

        <select id="transacoesCategoriaFilter" class="crud-search">
            <option value="">Todas as categorias</option>
        </select>

        <select id="transacoesMesFilter" class="crud-search">
            <option value="">Todos os meses</option>
            <option value="1">Janeiro</option>
            <option value="2">Fevereiro</option>
            <option value="3">Março</option>
            <option value="4">Abril</option>
            <option value="5">Maio</option>
            <option value="6">Junho</option>
            <option value="7">Julho</option>
            <option value="8">Agosto</option>
            <option value="9">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
        </select>

        <input id="transacoesAnoFilter" class="crud-search" type="number" min="2000" step="1" placeholder="Ano (ex: 2026)">

        <button id="transacoesApplyFiltersBtn" type="button" class="action-btn action-btn--ghost">
            <span class="action-btn__icon" aria-hidden="true">🔎</span>
            <span class="action-btn__label">Aplicar filtros</span>
        </button>

        <button id="transacoesClearFiltersBtn" type="button" class="action-btn action-btn--ghost">
            <span class="action-btn__icon" aria-hidden="true">✕</span>
            <span class="action-btn__label">Limpar filtros</span>
        </button>
    </div>

    <div class="crud-table-wrapper">
        <table class="crud-table" aria-label="Tabela de transações">
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Data movimentação</th>
                    <th class="col-actions">Ações</th>
                </tr>
            </thead>
            <tbody id="transacoesTableBody"></tbody>
        </table>
    </div>

    <footer class="crud-pagination">
        <button id="transacoesPrevPageBtn" type="button" class="pager-btn">Anterior</button>
        <span id="transacoesPageInfo">Página 1 de 1</span>
        <button id="transacoesNextPageBtn" type="button" class="pager-btn">Próxima</button>
    </footer>
</section>
